# Cloud Build config for the frontend (issue #53). Triggered on push to
# `main` for changes under frontend/** — see infra/gcp/README.md "Stage 5".
#
# VITE_API_URL is baked into the JS bundle at build time (see
# infra/gcp/README.md "Stage 3"), so this looks up the live backend URL first
# and passes it as a --build-arg, mirroring deploy-frontend-cloud-run.sh's
# auto-discovery. Steps share /workspace, so the lookup is written to a file
# and read back in the build step.
steps:
  - id: get-backend-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run services describe ${_BACKEND_SERVICE} \
          --project="$PROJECT_ID" --region=${_REGION} \
          --format='value(status.url)' > /workspace/backend_url.txt
        echo "Building against backend URL: $(cat /workspace/backend_url.txt)"

  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker build \
          --build-arg VITE_API_URL="$(cat /workspace/backend_url.txt)" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/web:$SHORT_SHA \
          frontend

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/web:${SHORT_SHA}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/web:${SHORT_SHA}
      - --region=${_REGION}
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/web:${SHORT_SHA}

substitutions:
  _REGION: us-central1
  _REPO_NAME: fergoni
  _SERVICE_NAME: fergoni-web
  _BACKEND_SERVICE: fergoni-api

options:
  logging: CLOUD_LOGGING_ONLY
