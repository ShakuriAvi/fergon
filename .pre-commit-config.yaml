# Pre-commit security hooks for fergoni (פירגוני)
# Install once:   pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
#
# These hooks run before every commit and block the commit if a secret,
# private key, or known-insecure Python pattern is detected.

minimum_pre_commit_version: "3.5.0"

repos:
  # --- Secret scanning (language-agnostic, whole repo) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (scan for hardcoded secrets)

  # --- General safety / hygiene hooks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
        name: detect private keys
      - id: detect-aws-credentials
        name: detect AWS credentials
        args: ["--allow-missing-credentials"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-toml

  # --- Python static security analysis (backend) ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        name: bandit (Python security SAST)
        args: ["-c", "backend/pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^backend/
        exclude: ^backend/(tests/|.*/tests?/|.*test_.*\.py$)

  # --- Dependency vulnerability audit (backend) ---
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        name: pip-audit (scan requirements for CVEs)
        args: ["-r", "backend/requirements.txt"]
        pass_filenames: false
